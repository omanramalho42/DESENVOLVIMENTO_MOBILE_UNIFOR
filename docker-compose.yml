services:
  expo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alimenta_mais_expo
    working_dir: /app
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      CHOKIDAR_USEPOLLING: "1"
      EXPO_PUBLIC_FB_API_KEY: ${EXPO_PUBLIC_FB_API_KEY:-}
      EXPO_PUBLIC_FB_AUTH_DOMAIN: ${EXPO_PUBLIC_FB_AUTH_DOMAIN:-}
      EXPO_PUBLIC_FB_PROJECT_ID: ${EXPO_PUBLIC_FB_PROJECT_ID:-}
      EXPO_PUBLIC_FB_STORAGE_BUCKET: ${EXPO_PUBLIC_FB_STORAGE_BUCKET:-}
      # Para Android em alguns ambientes Linux com OpenSSL 3
      NODE_OPTIONS: --openssl-legacy-provider
    command: sh -c "npm install --package-lock=false && npx expo start --lan --clear"
    volumes:
      - ./:/app
      - /app/node_modules
    # Em Linux, host network facilita descoberta e acesso via Expo Go na LAN.
    network_mode: host
    stdin_open: true
    tty: true